<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>

    <style>
        body{
            margin:0;
            font-family: Arial;
        }

        nav{
            background-color:#444;
        }

        nav ul{
            list-style:none;
            margin:0;
            padding:0;
            display:flex;
            justify-content:center;
        }

        nav ul li{
            padding:15px 25px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        nav ul li:hover{
            background-color:#666;
        }
    </style>

</head>

<body>

<nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Tutorials</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Newsletter</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

</body>
</html>
